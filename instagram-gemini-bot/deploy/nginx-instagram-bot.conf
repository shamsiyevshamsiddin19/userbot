# Nginx reverse proxy — HTTPS webhook uchun
# SIZNING_DOMEN.uz o'rniga o'z domeningizni yozing (yoki duckdns subdomain)
#
# /etc/nginx/sites-available/ ga qo'ying, keyin sites-enabled ga symlink qiling.
# HTTPS sertifikatni certbot avtomatik qo'shadi.

server {
    listen 80;
    server_name SIZNING_DOMEN.uz;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
